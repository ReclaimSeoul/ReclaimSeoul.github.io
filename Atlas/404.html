<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Reclaim Seoul Wasp Atlas Explorer</title>
    <script>
      var locationRef = window.location;
      var route = locationRef.pathname.replace(/^\/Atlas/i, '') || '/';
      var query = locationRef.search
        ? '&' + locationRef.search.slice(1).replace(/&/g, '~and~')
        : '';
      var newUrl =
        locationRef.protocol +
        '//' +
        locationRef.hostname +
        (locationRef.port ? ':' + locationRef.port : '') +
        '/Atlas/?' +
        route.replace(/&/g, '~and~') +
        query +
        locationRef.hash;

      locationRef.replace(newUrl);
    </script>
  </head>
  <body></body>
</html>
