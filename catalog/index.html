<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Design Catalog | Reclaim Seoul</title>
    <meta name="description" content="Student design proposals from Reclaim Seoul, arranged by group." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" href="../Atlas/assets/fav.svg" type="image/svg+xml" />
    <script src="../assets/site-nav.js" defer></script>
    <script src="catalog.js" defer></script>
    <style>
      :root { --ink:#101214; --muted:#596069; --paper:#f3f5ef; --panel:#fff; --line:rgba(16,18,20,.13); --hive-green:#00d084; --hive-cyan:#34e2e4; --hive-lime:#cafa80; --dark-panel:#141719; }
      * { box-sizing:border-box; }
      body { margin:0; color:var(--ink); background:linear-gradient(90deg,rgba(17,19,24,.035) 1px,transparent 1px),linear-gradient(rgba(17,19,24,.035) 1px,transparent 1px),var(--paper); background-size:32px 32px; font-family:Sora,ui-sans-serif,system-ui,sans-serif; line-height:1.5; }
      a { color:inherit; }
      .wrap { width:min(1180px,calc(100% - 32px)); margin:0 auto; }
      .hero { padding:72px 0 58px; }
      .eyebrow { display:inline-flex; border-left:5px solid var(--hive-green); padding-left:12px; color:#243038; font-size:.82rem; font-weight:800; text-transform:uppercase; }
      h1 { max-width:900px; margin:20px 0 18px; font-size:clamp(3rem,9vw,7.2rem); line-height:.88; }
      .lead { max-width:760px; margin:0; color:#242932; font-size:clamp(1.06rem,1.8vw,1.34rem); }
      main { min-height:55vh; border-top:1px solid var(--line); background:#fbfcf8; padding:58px 0 90px; }
      .status { padding:24px; border:1px solid var(--line); border-radius:8px; background:white; }
      .group + .group { margin-top:68px; }
      .group-head { display:flex; align-items:end; justify-content:space-between; gap:20px; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid var(--line); }
      .group h2 { margin:0; font-size:clamp(2rem,4vw,3.7rem); line-height:1; text-transform:capitalize; }
      .count { color:var(--muted); font-size:.8rem; font-weight:700; text-transform:uppercase; }
      .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:16px; }
      .card { display:grid; grid-template-rows:auto 1fr; min-width:0; border:1px solid var(--line); border-radius:8px; padding:0; overflow:hidden; background:white; color:inherit; cursor:pointer; font:inherit; text-align:left; transition:transform .18s,box-shadow .18s,border-color .18s; }
      .card:hover,.card:focus-visible { transform:translateY(-4px); border-color:rgba(0,208,132,.7); box-shadow:0 18px 40px rgba(17,19,24,.12); outline:none; }
      .thumb { width:100%; aspect-ratio:4/3; object-fit:cover; background:var(--dark-panel); }
      .card-copy { display:grid; align-content:start; gap:7px; padding:18px; }
      .card h3 { margin:0; font-size:1.18rem; }
      .system { color:var(--muted); font-size:.76rem; font-weight:700; text-transform:uppercase; }
      dialog { width:min(1080px,calc(100% - 24px)); max-height:calc(100vh - 24px); padding:0; border:1px solid rgba(255,255,255,.14); border-radius:10px; background:var(--dark-panel); color:white; box-shadow:0 30px 100px rgba(0,0,0,.5); }
      dialog::backdrop { background:rgba(10,12,13,.72); backdrop-filter:blur(8px); }
      .dialog-bar { position:sticky; top:0; z-index:2; display:flex; justify-content:flex-end; padding:12px; background:linear-gradient(var(--dark-panel) 60%,transparent); }
      .close { width:42px; height:42px; border:1px solid rgba(255,255,255,.3); border-radius:6px; background:#fff; color:var(--ink); cursor:pointer; font-size:1.45rem; }
      .detail { padding:0 clamp(20px,5vw,56px) 56px; }
      .detail-hero { display:grid; grid-template-columns:minmax(0,1.1fr) minmax(280px,.9fr); gap:34px; align-items:start; }
      .detail-hero img { width:100%; max-height:600px; border-radius:7px; object-fit:contain; background:#0d0f10; }
      .detail h2 { margin:12px 0 14px; font-size:clamp(2.3rem,6vw,5rem); line-height:.92; }
      .detail .description { color:#d8ddda; font-size:1.05rem; }
      .tags { display:flex; flex-wrap:wrap; gap:7px; margin-top:20px; }
      .tag { border:1px solid rgba(52,226,228,.45); border-radius:999px; padding:5px 10px; color:var(--hive-lime); font-size:.75rem; }
      .atlas-button { display:inline-flex; align-items:center; justify-content:center; min-height:48px; margin-top:26px; border:2px solid var(--hive-green); border-radius:6px; padding:0 18px; background:linear-gradient(135deg,var(--hive-lime),var(--hive-green)); color:var(--ink); font-size:.86rem; font-weight:800; text-decoration:none; }
      .atlas-button:hover,.atlas-button:focus-visible { background:white; border-color:white; outline:none; }
      .assets { margin-top:46px; }
      .assets h3 { font-size:1.7rem; }
      .asset-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:14px; }
      .asset { display:grid; gap:9px; margin:0; color:#bbc2c0; font-size:.75rem; overflow-wrap:anywhere; }
      .asset img,.asset video { width:100%; max-height:520px; border-radius:6px; object-fit:contain; background:#0d0f10; }
      .asset-link { display:flex; align-items:center; min-height:100px; border:1px solid rgba(255,255,255,.2); border-radius:6px; padding:18px; color:var(--hive-cyan); }
      @media(max-width:760px){ .hero{padding:48px 0}.detail-hero{grid-template-columns:1fr}.group-head{align-items:start;flex-direction:column}.grid{grid-template-columns:1fr 1fr} }
      @media(max-width:500px){ .grid{grid-template-columns:1fr}.detail{padding-inline:16px}.atlas-button{width:100%;text-align:center} }
    </style>
  </head>
  <body>
    <site-nav base="../" current="catalog"></site-nav>
    <header class="hero"><div class="wrap"><span class="eyebrow">Student work / 2026</span><h1>Design Catalog</h1><p class="lead">Finalized proposals generated from reclaimed material systems, collected by studio group.</p></div></header>
    <main><div class="wrap" id="catalog"><p class="status">Loading designs…</p></div></main>
    <dialog id="design-dialog" aria-labelledby="detail-title"><div class="dialog-bar"><button class="close" type="button" aria-label="Close design details">×</button></div><article class="detail" id="design-detail"></article></dialog>
  </body>
</html>
